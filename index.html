<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; URL='https://github.com/kurodev98-creato/projeto_avaliativo'">
    <title>Redirecionando para o Repositório</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h2 { color: #58a6ff; }
        a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover { text-decoration: underline; }
        .loader {
            border: 4px solid #21262d;
            border-top: 4px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Redirecionando para o Repositório do Projeto...</h2>
        <p>Você está sendo encaminhado para a documentação técnica no GitHub.</p>
        <p>Caso não seja redirecionado em instantes, <a href="https://github.com/kurodev98-creato/projeto_avaliativo">clique aqui para acessar diretamente</a>.</p>
    </div>
</body>
</html>
